<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancing Mania - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Freelancing Mania</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="book.html">Book Store</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Contact Us</h2>
        <p>Email: info@freelancingmania.pk</p>
        <p>Phone: +92 123 4567890</p>
        <p>Location: Karachi, Pakistan</p>
    </main>
    <footer>
        <p>&copy; 2023 Freelancing Mania. All rights reserved.</p>
    </footer>
    <div class="cart">
        <button onclick="viewCart()">Cart (<span id="cart-count">0</span>)</button>
    </div>
    
    <!-- Cart Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCart()">&times;</span>
            <h2>Your Cart</h2>
            <ul id="cart-items"></ul>
            <p>Total: PKR <span id="cart-total">0</span></p>
            <button onclick="proceedToPayment()">Proceed to Payment</button>
        </div>
    </div>
    
    <!-- Payment Modal -->
    <div id="payment-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closePayment()">&times;</span>
            <h2>Select Payment Method</h2>
            <button onclick="selectPayment('JazzCash')">JazzCash</button>
            <button onclick="selectPayment('Easypaisa')">Easypaisa</button>
            <button onclick="selectPayment('Bank Transfer')">Bank Transfer</button>
            <button onclick="selectPayment('Credit Card')">Credit Card</button>
        </div>
    </div>
    
    <script src="script.js"></script>
    <section>
    <h2>Contact Us</h2>

    <iframe
        src="https://tally.so/r/rjYo65"
        width="100%"
        height="700"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        title="Contact Form">
    </iframe>
</section>
</body>
</html>
